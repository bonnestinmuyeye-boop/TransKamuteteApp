<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trans Kamutete - Direction Générale</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Conteneur principal fluide qui s'adapte à tous les écrans -->
    <div class="app-container">
        
        <!-- En-tête de l'application -->
        <header class="app-header">
            <h1>Trans Kamutete</h1>
            <button class="btn-quitter">Quitter</button>
        </header>

        <!-- Contenu Administratif -->
        <main class="app-main">
            <h2>Direction Générale</h2>
            <p class="subtitle">Console de configuration administrative</p>

            <!-- Barre de Navigation des Onglets -->
            <nav class="tabs-nav">
                <button class="tab-link">Guichetiers</button>
                <button class="tab-link">Convoyeurs</button>
                <button class="tab-link">Kilogrammes</button>
                <button class="tab-link">Messagerie</button>
                <button class="tab-link active">Colis</button>
            </nav>

            <!-- Section de Contenu Dynamique -->
            <section class="tab-content">
                
                <!-- Formulaire d'enregistrement d'un colis -->
                <div class="form-container">
                    <h3>Enregistrement d'un nouveau colis</h3>
                    <form id="formColis">
                        
                        <!-- NOUVEAU : Champ Nom de l'expéditeur -->
                        <div class="input-group">
                            <label for="nomExpediteur">Nom de l'expéditeur</label>
                            <input type="text" id="nomExpediteur" placeholder="Ex: Bonnestin Muyeye" required>
                        </div>

                        <div class="input-group">
                            <label for="natureMarchandise">Nature de la marchandise</label>
                            <input type="text" id="natureMarchandise" placeholder="Ex: Sac de farine, Composants" required>
                        </div>

                        <div class="input-group">
                            <label for="poidsColis">Poids (en Kg)</label>
                            <input type="number" id="poidsColis" placeholder="Ex: 15" min="1" required>
                        </div>

                        <div class="input-group">
                            <label for="nomDestinataire">Nom du destinataire</label>
                            <input type="text" id="nomDestinataire" placeholder="Ex: Sarah Kazadi" required>
                        </div>

                        <div class="input-group">
                            <label for="telephoneDestinataire">Téléphone du destinataire</label>
                            <input type="tel" id="telephoneDestinataire" placeholder="Ex: +243972177681" required>
                        </div>

                        <button type="submit" class="btn-submit">Émettre le Bordereau</button>
                    </form>
                </div>

            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
